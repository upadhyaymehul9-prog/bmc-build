name: Build BookMyClinic AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialize TWA project
        run: |
          mkdir twa-project && cd twa-project
          bubblewrap init --manifest=https://bookmyclinics.com/manifest.json \
            --packageId=com.bookmyclinic.app \
            --name="BookMyClinic" \
            --shortName="BookMyClinic" \
            --host=bookmyclinics.com \
            --startUrl=/ \
            --themeColor=#0f172a \
            --backgroundColor=#0f172a \
            --iconUrl=https://upadhyaymehul9-prog.github.io/bookmyclinic/icon-512.png \
            --maskableIconUrl=https://upadhyaymehul9-prog.github.io/bookmyclinic/icon-512.png \
            --appVersionCode=2 \
            --appVersionName=1.0.1 \
            --signingKeyPath=../keystore/bookmyclinic.keystore \
            --signingKeyAlias=bookmyclinic \
            --signingKeyPassword=${{ secrets.KEYSTORE_PASSWORD }} \
            --signingKeyStorePassword=${{ secrets.KEYSTORE_PASSWORD }} \
            --skipPwaValidation

      - name: Generate signing keystore
        run: |
          mkdir -p keystore
          keytool -genkey -v \
            -keystore keystore/bookmyclinic.keystore \
            -alias bookmyclinic \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEYSTORE_PASSWORD }} \
            -dname "CN=BookMyClinic Admin, OU=Engineering, O=BookMyClinic, L=Ankleshwar, ST=Gujarat, C=IN"

      - name: Build AAB
        run: |
          cd twa-project
          bubblewrap build --skipPwaValidation

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v3
        with:
          name: BookMyClinic-v2-AAB
          path: twa-project/app-release-bundle.aab
          retention-days: 7

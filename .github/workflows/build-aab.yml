name: Build BookMyClinic AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli --prefer-online

      - name: Generate signing keystore
        run: |
          mkdir -p keystore
          keytool -genkey -v \
            -keystore keystore/bookmyclinic.keystore \
            -alias bookmyclinic \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -dname "CN=BookMyClinic Admin, OU=Engineering, O=BookMyClinic, L=Ankleshwar, ST=Gujarat, C=IN"

      - name: Create Bubblewrap config
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "/usr/lib/jvm/temurin-17-jdk-amd64",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          EOF

      - name: Create TWA manifest
        run: |
          mkdir twa-project
          cat > twa-project/twa-manifest.json << EOF
          {
            "packageId": "com.bookmyclinic.app",
            "host": "bookmyclinics.com",
            "name": "BookMyClinic",
            "launcherName": "BookMyClinic",
            "display": "standalone",
            "themeColor": "#0f172a",
            "navigationColor": "#0f172a",
            "navigationColorDark": "#0f172a",
            "navigationDividerColor": "#0f172a",
            "navigationDividerColorDark": "#0f172a",
            "backgroundColor": "#0f172a",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://upadhyaymehul9-prog.github.io/bookmyclinic/icon-512.png",
            "maskableIconUrl": "https://upadhyaymehul9-prog.github.io/bookmyclinic/icon-512.png",
            "monochromeIconUrl": "",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "../keystore/bookmyclinic.keystore",
              "alias": "bookmyclinic"
            },
            "appVersionCode": 2,
            "appVersion": "1.0.1",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://bookmyclinics.com/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {},
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "minSdkVersion": 19,
            "orientation": "default",
            "fingerprints": []
          }
          EOF

      - name: Build AAB
        run: |
          cd twa-project
          bubblewrap build \
            --signingKeyPath=../keystore/bookmyclinic.keystore \
            --signingKeyAlias=bookmyclinic \
            --signingKeyPassword="${{ secrets.KEYSTORE_PASSWORD }}" \
            --signingKeyStorePassword="${{ secrets.KEYSTORE_PASSWORD }}"

      - name: Find AAB file
        run: find . -name "*.aab" 2>/dev/null || echo "No AAB found"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: BookMyClinic-v2-AAB
          path: |
            twa-project/**/*.aab
          retention-days: 7
          if-no-files-found: warn

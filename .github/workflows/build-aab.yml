name: Build BookMyClinic AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli --prefer-online

      - name: Generate signing keystore
        run: |
          mkdir -p keystore
          keytool -genkey -v \
            -keystore keystore/bookmyclinic.keystore \
            -alias bookmyclinic \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -dname "CN=BookMyClinic Admin, OU=Engineering, O=BookMyClinic, L=Ankleshwar, ST=Gujarat, C=IN"

      - name: Create Bubblewrap config
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "/usr/lib/jvm/temurin-17-jdk-amd64",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          EOF
          cat ~/.bubblewrap/config.json

      - name: Initialize TWA project
        run: |
          mkdir twa-project
          cd twa-project
          bubblewrap init \
            --manifest=https://bookmyclinics.com/manifest.json \
            --packageId=com.bookmyclinic.app \
            --name="BookMyClinic" \
            --shortName="BookMyClinic" \
            --host=bookmyclinics.com \
            --startUrl=/ \
            --themeColor=#0f172a \
            --backgroundColor=#0f172a \
            --iconUrl=https://upadhyaymehul9-prog.github.io/bookmyclinic/icon-512.png \
            --maskableIconUrl=https://upadhyaymehul9-prog.github.io/bookmyclinic/icon-512.png \
            --appVersionCode=2 \
            --appVersionName=1.0.1 \
            --signingKeyPath=../keystore/bookmyclinic.keystore \
            --signingKeyAlias=bookmyclinic \
            --signingKeyPassword="${{ secrets.KEYSTORE_PASSWORD }}" \
            --signingKeyStorePassword="${{ secrets.KEYSTORE_PASSWORD }}" \
            --skipPwaValidation

      - name: Build AAB
        run: |
          cd twa-project
          bubblewrap build --skipPwaValidation

      - name: Find AAB file
        run: find . -name "*.aab" 2>/dev/null || echo "No AAB found"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: BookMyClinic-v2-AAB
          path: |
            twa-project/**/*.aab
            twa-project/app-release-bundle.aab
          retention-days: 7
          if-no-files-found: warn

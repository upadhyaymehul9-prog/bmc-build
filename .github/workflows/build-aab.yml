name: Build BookMyClinic AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Accept licenses and install build tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli --prefer-online

      - name: Restore PWABuilder keystore from secret
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore/signing.keystore

      - name: Create Bubblewrap config
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "/usr/lib/jvm/temurin-17-jdk-amd64",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          EOF

      - name: Create TWA manifest
        run: |
          mkdir twa-project
          cat > twa-project/twa-manifest.json << 'EOF'
          {
            "packageId": "com.bookmyclinic.app",
            "host": "bookmyclinics.com",
            "name": "BookMyClinic",
            "launcherName": "BookMyClinic",
            "display": "standalone",
            "themeColor": "#0f172a",
            "navigationColor": "#0f172a",
            "navigationColorDark": "#0f172a",
            "navigationDividerColor": "#0f172a",
            "navigationDividerColorDark": "#0f172a",
            "backgroundColor": "#0f172a",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://upadhyaymehul9-prog.github.io/bookmyclinic/icon-512.png",
            "maskableIconUrl": "https://upadhyaymehul9-prog.github.io/bookmyclinic/icon-512.png",
            "monochromeIconUrl": "",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "../keystore/signing.keystore",
              "alias": "my-key-alias"
            },
            "appVersionCode": 3,
            "appVersion": "1.0.2",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://bookmyclinics.com/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {},
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "minSdkVersion": 21,
            "orientation": "default",
            "fingerprints": []
          }
          EOF

      - name: Generate Android project via bubblewrap update
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          cd twa-project
          bubblewrap update --skipVersionUpgrade

      - name: Build AAB
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          cd twa-project
          bubblewrap build --skipPwaValidation \
            --signingKeyPath=../keystore/signing.keystore \
            --signingKeyAlias=my-key-alias

      - name: Find and verify AAB
        run: |
          find . -name "*.aab" 2>/dev/null || echo "No AAB found"
          AAB=$(find . -name "*.aab" | head -1)
          if [ -n "$AAB" ]; then
            keytool -printcert -jarfile "$AAB" | grep "SHA1"
          fi

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: BookMyClinic-v3-AAB
          path: twa-project/**/*.aab
          retention-days: 7
          if-no-files-found: warn
